<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SF Peninsula New Construction Pipeline</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
  header{background:#1a2b4a;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header h1{font-size:17px;font-weight:500;letter-spacing:0.01em}
  header span{font-size:12px;opacity:0.6}
  .toolbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .toolbar input[type=text]{flex:1;min-width:160px;padding:6px 10px;border:1px solid #d0d0cc;border-radius:6px;font-size:13px;outline:none}
  .toolbar input:focus{border-color:#1a2b4a}
  select{padding:6px 10px;border:1px solid #d0d0cc;border-radius:6px;font-size:13px;background:#fff;outline:none;cursor:pointer}
  select:focus{border-color:#1a2b4a}
  .main{display:flex;height:calc(100vh - 102px);position:relative}
  #map{flex:1;min-width:0;z-index:0}
  .sidebar{width:340px;overflow-y:auto;background:#f5f5f3;border-left:1px solid #e5e5e3}
  .legend{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.96);border:1px solid #e5e5e3;border-radius:8px;padding:8px 14px;display:flex;gap:14px;flex-wrap:wrap;z-index:999;font-size:12px;pointer-events:none;max-width:90%}
  @media(max-width:640px){
    header h1{font-size:15px}
    .main{flex-direction:column;height:auto;position:static}
    #map{height:45vh;min-height:200px;width:100%;display:block}
    .legend{position:relative;bottom:auto;left:auto;transform:none;margin:8px;width:calc(100% - 16px);max-width:none;justify-content:center;font-size:11px;gap:8px;pointer-events:auto}
    .sidebar{width:100%;border-left:none;border-top:1px solid #e5e5e3;overflow-y:visible}
    .toolbar{flex-direction:column;align-items:stretch}
    .toolbar input[type=text]{width:100%}
    select{width:100%}
    .card{margin:8px}
  }
  .sidebar-header{padding:12px 14px 8px;font-size:12px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #e5e5e3;background:#fff}
  .card{background:#fff;margin:10px;border-radius:8px;border:1px solid #e5e5e3;overflow:hidden;cursor:pointer;transition:box-shadow 0.15s}
  .card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  .card.active{border-color:#1a2b4a;box-shadow:0 0 0 2px rgba(26,43,74,0.15)}
  .card-body{padding:12px 14px}
  .card-address{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
  .card-sub{font-size:12px;color:#888;margin-bottom:8px}
  .card-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
  .badge-permit{background:#e8f0fe;color:#1a56a4}
  .badge-review{background:#fff3cd;color:#856404}
  .badge-approved{background:#d1fae5;color:#065f46}
  .badge-construction{background:#fce7f3;color:#9d174d}
  .badge-listed{background:#ede9fe;color:#5b21b6}
  .type-tag{font-size:11px;color:#888;background:#f0f0ee;padding:2px 7px;border-radius:4px}
  .detail-panel{display:none;background:#fff;border-top:1px solid #e5e5e3;padding:14px}
  .detail-panel.open{display:block}
  .detail-panel h3{font-size:15px;font-weight:500;margin-bottom:4px}
  .detail-panel p{font-size:13px;color:#555;line-height:1.6;margin-bottom:10px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-bottom:10px}
  .detail-item label{font-size:11px;color:#888;display:block}
  .detail-item span{font-size:13px;color:#1a1a1a;font-weight:500}
  .doc-btn{display:inline-block;margin:0 6px 6px 0;padding:6px 12px;background:#f0f4ff;color:#1a2b4a;border:1px solid #c5d0e8;border-radius:6px;font-size:12px;text-decoration:none}
  .doc-btn:hover{background:#e0e8ff}
  .legend-item{display:flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .no-results{padding:24px;text-align:center;color:#888;font-size:13px}
  .count-badge{background:#1a2b4a;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px}
  .loading{padding:24px;text-align:center;color:#888;font-size:13px}
  .error-msg{margin:10px;padding:12px;background:#fff3cd;border:1px solid #f5c842;border-radius:8px;font-size:12px;color:#856404;line-height:1.6}
</style>
</head>
<body>

<header>
  <h1>SF Peninsula New Construction Pipeline</h1>
  <span>Powered by Google Sheets</span>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search address or neighborhood..."/>
  <select id="filter-status">
    <option value="">All statuses</option>
    <option value="Permit Filed">Permit Filed</option>
    <option value="Under Review">Under Review</option>
    <option value="Approved">Approved</option>
    <option value="Construction Started">Construction Started</option>
    <option value="May Be Listed">May Be Listed</option>
  </select>
  <select id="filter-type">
    <option value="">All types</option>
    <option value="Single-Family">Single-Family</option>
    <option value="Condo Building">Condo Building</option>
    <option value="Townhomes">Townhomes</option>
  </select>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      Projects <span class="count-badge" id="result-count">0</span>
    </div>
    <div id="cards-container"><div class="loading">Loading projects...</div></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="dot" style="background:#3b82f6"></span>Permit Filed</div>
  <div class="legend-item"><span class="dot" style="background:#f59e0b"></span>Under Review</div>
  <div class="legend-item"><span class="dot" style="background:#10b981"></span>Approved</div>
  <div class="legend-item"><span class="dot" style="background:#ec4899"></span>Construction Started</div>
  <div class="legend-item"><span class="dot" style="background:#8b5cf6"></span>May Be Listed</div>
</div>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_IkoOesMqd_-ELyEyxxk_3DJbHyKggDUSmnGVw3-zjCPUNzUCum00ZjykjfIXJulDT5nlTrdHTKPl/pub?gid=0&single=true&output=csv';

const STATUS_COLORS = {
  'Permit Filed':'#3b82f6',
  'Under Review':'#f59e0b',
  'Approved':'#10b981',
  'Construction Started':'#ec4899',
  'May Be Listed':'#8b5cf6'
};
const BADGE_CLASSES = {
  'Permit Filed':'badge-permit',
  'Under Review':'badge-review',
  'Approved':'badge-approved',
  'Construction Started':'badge-construction',
  'May Be Listed':'badge-listed'
};

let allProjects = [];
let markers = {};
let activeId = null;
let map;

function initMap(){
  map = L.map('map').setView([37.5741, -122.3588], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap contributors © CARTO', maxZoom:19
  }).addTo(map);
}

function makeIcon(color){
  return L.divIcon({
    className:'',
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
    iconSize:[14,14], iconAnchor:[7,7]
  });
}

function parseCSV(text){
  const rows = text.trim().split('\n');
  const headers = rows[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/ /g,'_'));
  return rows.slice(1).map((row,i)=>{
    const vals=[];let cur='',inQ=false;
    for(let c of row){
      if(c==='"'){inQ=!inQ}
      else if(c===','&&!inQ){vals.push(cur);cur=''}
      else{cur+=c}
    }
    vals.push(cur);
    const obj={id:i+1};
    headers.forEach((h,idx)=>obj[h]=(vals[idx]||'').trim());
    obj.lat=parseFloat(obj.latitude);
    obj.lng=parseFloat(obj.longitude);
    return obj;
  }).filter(p=>!isNaN(p.lat)&&!isNaN(p.lng));
}

async function loadData(){
  try{
    const res = await fetch(SHEET_CSV_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    allProjects = parseCSV(text);
    if(!allProjects.length) throw new Error('No valid rows found');
    renderAll();
  }catch(e){
    document.getElementById('cards-container').innerHTML=`
      <div class="error-msg">
        <strong>Could not load data.</strong><br>
        Make sure your Google Sheet is published via<br>
        <em>File → Share → Publish to web → CSV</em><br><br>
        Error: ${e.message}
      </div>`;
    document.getElementById('result-count').textContent='0';
  }
}

function renderAll(){
  const search = document.getElementById('search').value.toLowerCase();
  const filterStatus = document.getElementById('filter-status').value;
  const filterType = document.getElementById('filter-type').value;

  const filtered = allProjects.filter(p=>{
    const matchSearch = !search ||
      (p.address||'').toLowerCase().includes(search) ||
      (p.neighborhood||'').toLowerCase().includes(search) ||
      (p.city||'').toLowerCase().includes(search);
    const matchStatus = !filterStatus || p.status===filterStatus;
    const matchType = !filterType || p.type===filterType;
    return matchSearch && matchStatus && matchType;
  });

  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};

  filtered.forEach(p=>{
    const color = STATUS_COLORS[p.status]||'#888';
    const m = L.marker([p.lat,p.lng],{icon:makeIcon(color)}).addTo(map);
    m.bindTooltip(`<strong>${p.address}</strong><br>${p.status}`,{direction:'top',offset:[0,-6]});
    m.on('click',()=>selectProject(p.id));
    markers[p.id]=m;
  });

  document.getElementById('result-count').textContent=filtered.length;
  const container=document.getElementById('cards-container');

  if(!filtered.length){
    container.innerHTML='<div class="no-results">No projects match your filters.</div>';
    return;
  }

  container.innerHTML=filtered.map(p=>`
    <div class="card${activeId===p.id?' active':''}" id="card-${p.id}" onclick="selectProject(${p.id})">
      <div class="card-body">
        <div class="card-address">${p.address||'—'}</div>
        <div class="card-sub">${[p.neighborhood,p.city].filter(Boolean).join(', ')}</div>
        <div class="card-row">
          <span class="badge ${BADGE_CLASSES[p.status]||''}">${p.status||'Unknown'}</span>
          <span class="type-tag">${p.type||'—'}</span>
        </div>
      </div>
      <div class="detail-panel${activeId===p.id?' open':''}">
        <h3>${p.address||'—'}</h3>
        <p>${p.description||'No description provided.'}</p>
        <div class="detail-grid">
          <div class="detail-item"><label>Est. Completion</label><span>${p.est_completion||'—'}</span></div>
          <div class="detail-item"><label>Project Type</label><span>${p.type||'—'}</span></div>
          <div class="detail-item"><label>May Be Listed?</label><span>${p.may_be_listed||'—'}</span></div>
        </div>
        ${[['renderings','Renderings'],['proposed_plans','Proposed Plans'],['project_record','Project Record']].filter(([k])=>p[k]).map(([k,label])=>`<a class="doc-btn" href="${p[k]}" target="_blank" rel="noopener">${label}</a>`).join('')}
      </div>
    </div>
  `).join('');
}

function selectProject(id){
  activeId = activeId===id ? null : id;
  renderAll();
  if(activeId && markers[activeId]){
    const p=allProjects.find(x=>x.id===id);
    map.setView([p.lat,p.lng],15,{animate:true});
    setTimeout(()=>{
      const el=document.getElementById(`card-${id}`);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}

document.getElementById('search').addEventListener('input',renderAll);
document.getElementById('filter-status').addEventListener('change',renderAll);
document.getElementById('filter-type').addEventListener('change',renderAll);

initMap();
loadData();
</script>
</body>
</html>
